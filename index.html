<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script type="text/javascript">
      // Self-heal watchdog: if the app shell renders nothing into #root within
      // 10s, assume a stuck/broken cache (e.g. a stale service worker serving an
      // old shell) and recover once per session by clearing the SW + caches and
      // reloading. Guarded by a sessionStorage flag so it can never loop.
      (function () {
        var KEY = 'pt_selfheal_done';
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root');
            if (root && root.childElementCount > 0) {
              sessionStorage.removeItem(KEY);
              return;
            }
            if (sessionStorage.getItem(KEY)) return;
            sessionStorage.setItem(KEY, '1');
            Promise.resolve()
              .then(function () {
                if ('serviceWorker' in navigator) {
                  return navigator.serviceWorker.getRegistrations().then(function (rs) {
                    return Promise.all(rs.map(function (r) { return r.unregister(); }));
                  });
                }
              })
              .then(function () {
                if (window.caches) {
                  return caches.keys().then(function (ks) {
                    return Promise.all(ks.map(function (k) { return caches.delete(k); }));
                  });
                }
              })
              .then(function () { window.location.reload(); })
              .catch(function () { window.location.reload(); });
          }, 10000);
        });
      })();
    </script>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // Restores the original deep-link URL that 404.html encoded into the query
      // string, before React Router reads window.location.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <link rel="icon" type="image/svg+xml" href="/peptide-tracker-app/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PepTrack" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Peptide Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

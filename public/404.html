<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Peptide Tracker</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages has no server-side routing, so a deep link or a refresh on
      // any client-side route (e.g. /peptide-tracker-app/settings) is served this
      // 404 page. We redirect to the app root, encoding the original path in the
      // query string so index.html can restore it before React Router boots.
      var pathSegmentsToKeep = 1; // project page lives under /peptide-tracker-app/
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
